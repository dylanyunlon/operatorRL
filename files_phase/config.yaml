hydra:
  searchpath:
    - pkg://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

agentlightning:
  port: 9999
  trace_aggregator:
    level: transition  # transition or trajectory, docs refer to https://agent-lightning.github.io/posts/trajectory_level_aggregation/
    trajectory_max_prompt_length: 2048  # supported in trajectory level aggregation, suggest to set as maximum length for the prompt in first turn
    trajectory_max_response_length: 8192  # supported in trajectory level aggregation, suggest to set as maximum length for the cumulative agent responses in the full trajectory, i.e., n_turns * (max_response_length + max_prompt_length)
    debug: False  # supported in trajectory level aggregation, enable to diagnose trace merging failures
    mismatch_log_dir: ./mismatch_cases  # supported in trajectory level aggregation with debug=True, directory to store logs of mismatch cases

# === M23: Trainium2 策略配置 (命题3: HTTP身体 → Neuron硬件) ===
# AWS Trainium2 特有参数，用于 NeuronX Distributed (NxD) 训练
trainium:
  # 每个节点的 Neuron Core 数量 (trn1.32xlarge = 32, trn1n.32xlarge = 32)
  neuron_cores_per_node: 32
  # 张量并行度 (通常设为 8 或 16)
  tensor_parallel_degree: 8
  # 流水线并行度
  pipeline_parallel_degree: 1
  # 数据并行度 (自动计算: total_cores / (tp * pp))
  data_parallel_degree: null
  # 逻辑 Neuron Core 配置
  logical_neuron_core_config:
    # 使用 BF16 混合精度
    use_bf16: true
    # 自动类型转换目标
    auto_cast_type: bf16
  # Neuron 编译器标志
  neuron_cc_flags: "--auto-cast=matmul --auto-cast-type=bf16 --model-type=transformer"
  # XLA 环境变量
  xla_flags:
    XLA_USE_BF16: "1"
    XLA_DOWNCAST_BF16: "1"
  # 是否启用 ZeRO 优化
  zero_optimization: true
  zero_stage: 1

data:
  filter_overlong_prompts: false

actor_rollout_ref:
  rollout:
    mode: async
    agent:
      custom_async_server:
        path: pkg://agentlightning.verl.async_server
        name: PatchedvLLMServer
